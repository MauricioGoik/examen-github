name: Reusable — Validation

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
    outputs:
      validation-passed:
        description: Whether validation passed
        value: ${{ jobs.validate.outputs.passed }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate ${{ inputs.component }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      passed: ${{ steps.validate.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validation
        id: validate
        run: |
          echo "Running validation for ${{ inputs.component }}"
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Generate summary
        run: |
          echo "## Validation — ${{ inputs.component }}" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Syntax | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
